profile: ambient

pilot:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi

global:
  proxy:
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 200m
        memory: 256Mi

meshConfig:
  enableTracing: true
  defaultConfig:
    tracing:
      sampling: 100.0
