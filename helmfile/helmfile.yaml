repositories:
  - name: istio
    url: https://istio-release.storage.googleapis.com/charts

releases:
  # 1. Istio Base (CRDs)
  - name: istio-base
    namespace: istio-system
    createNamespace: true
    chart: istio/base
    version: "1.24.0"
    values:
      - values/istio-base.yaml

  # 2. Istiod (Control Plane) - Ambient Mode
  - name: istiod
    namespace: istio-system
    chart: istio/istiod
    version: "1.24.0"
    needs:
      - istio-system/istio-base
    wait: true
    timeout: 300
    values:
      - values/istiod.yaml

  # 3. Istio CNI - Required for Ambient Mode
  - name: istio-cni
    namespace: istio-system
    chart: istio/cni
    version: "1.24.0"
    needs:
      - istio-system/istiod
    wait: true
    timeout: 300
    values:
      - values/istio-cni.yaml

  # 4. ztunnel - L4 Node Proxy for Ambient Mode
  - name: ztunnel
    namespace: istio-system
    chart: istio/ztunnel
    version: "1.24.0"
    needs:
      - istio-system/istio-cni
    wait: true
    timeout: 300
    values:
      - values/ztunnel.yaml

  # 5. Istio Ingress Gateway
  - name: istio-ingressgateway
    namespace: istio-ingress
    createNamespace: true
    chart: istio/gateway
    version: "1.24.0"
    needs:
      - istio-system/ztunnel
    wait: true
    timeout: 300
    values:
      - values/istio-gateway.yaml
