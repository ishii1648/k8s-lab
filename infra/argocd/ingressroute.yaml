apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.lab.local`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80   # http port (server.insecure=true なので HTTP backend)
  tls:
    secretName: argocd-tls
