apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-telemetry
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ishii1648/k8s-lab.git
    targetRevision: HEAD
    path: apps/agent-telemetry/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-telemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
