apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agent-telemetry
  namespace: agent-telemetry
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`telemetry.lab.local`)
      kind: Rule
      services:
        - name: agent-telemetry
          port: 8443   # ingest endpoint (HTTP backend, Traefik で TLS 終端)
  tls:
    secretName: agent-telemetry-tls
