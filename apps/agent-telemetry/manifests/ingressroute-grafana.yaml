apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agent-telemetry-grafana
  namespace: agent-telemetry
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.lab.local`)
      kind: Rule
      services:
        - name: agent-telemetry
          port: 3000   # grafana sidecar (HTTP backend, Traefik で TLS 終端)
  tls:
    secretName: agent-telemetry-grafana-tls
