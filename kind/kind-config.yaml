kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-lab
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP - Istio Ingress Gateway
      - containerPort: 30080
        hostPort: 8080
        listenAddress: "127.0.0.1"
        protocol: TCP
      # HTTPS - Istio Ingress Gateway
      - containerPort: 30443
        hostPort: 8443
        listenAddress: "127.0.0.1"
        protocol: TCP
      # Istio status port
      - containerPort: 30021
        hostPort: 15021
        listenAddress: "127.0.0.1"
        protocol: TCP
